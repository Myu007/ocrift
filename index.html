<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450, initial-scale=1.0">
<title>Claude Watch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #070a0f;
    --surface: #0d1117;
    --ring: #1a2332;
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --text: #e8f4fd;
    --muted: #546e7a;
    --user-bubble: #0a2540;
    --ai-bubble: #0d1a2e;
    --glow: rgba(79, 195, 247, 0.15);
  }

  html, body {
    width: 450px;
    height: 450px;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* WATCH BODY */
  .watch {
    width: 450px;
    height: 450px;
    border-radius: 50%;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    border: 2px solid #1a2a3a;
    box-shadow:
      0 0 0 4px #0a0f14,
      0 0 0 6px #1a2a3a,
      0 0 60px rgba(79,195,247,0.08),
      inset 0 0 80px rgba(0,0,0,0.6);
  }

  /* Ambient background effect */
  .watch::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(ellipse, rgba(79,195,247,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  /* Circular clip mask */
  .watch-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* SCREENS */
  .screen { 
    position: absolute; 
    inset: 0; 
    border-radius: 50%;
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

  /* HOME SCREEN */
  #home {
    background: var(--bg);
    gap: 8px;
  }

  .logo-ring {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow: 0 0 20px rgba(79,195,247,0.2), inset 0 0 20px rgba(79,195,247,0.05);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 20px rgba(79,195,247,0.2), inset 0 0 20px rgba(79,195,247,0.05); }
    50% { box-shadow: 0 0 35px rgba(79,195,247,0.4), inset 0 0 30px rgba(79,195,247,0.1); }
  }

  .logo-icon {
    font-size: 36px;
    filter: drop-shadow(0 0 8px rgba(79,195,247,0.6));
  }

  .watch-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--text);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(79,195,247,0.3);
  }

  .watch-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .tap-btn {
    margin-top: 12px;
    padding: 10px 28px;
    border-radius: 30px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tap-btn:active, .tap-btn:hover {
    background: rgba(79,195,247,0.12);
    box-shadow: 0 0 15px rgba(79,195,247,0.2);
  }

  /* CHAT SCREEN */
  #chat {
    background: var(--bg);
    flex-direction: column;
    justify-content: flex-start;
    padding: 0;
    overflow: hidden;
  }

  .chat-header {
    width: 100%;
    padding: 52px 40px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }

  .back-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--ring);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .back-btn:active { background: rgba(255,255,255,0.1); }

  .chat-title-bar {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.6);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 4px 30px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .messages::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    line-height: 1.5;
    animation: msg-in 0.25s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    color: var(--accent2);
    border: 1px solid rgba(79,195,247,0.15);
    border-bottom-right-radius: 4px;
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 4px;
  }

  .msg.typing {
    align-self: flex-start;
    background: var(--ai-bubble);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
  }

  .typing-dots {
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100%{ transform: translateY(0); opacity:0.4; }
    30%{ transform: translateY(-5px); opacity:1; }
  }

  /* Input row */
  .input-row {
    padding: 6px 30px 52px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--ring);
    border-radius: 20px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #070a0f;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(79,195,247,0.3);
  }
  .send-btn:active { transform: scale(0.9); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Circular vignette overlay */
  .vignette {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(7,10,15,0.6) 75%,
      rgba(7,10,15,0.95) 90%
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Corner fade for messages near edges */
  .messages-fade-top {
    position: absolute;
    top: 88px;
    left: 0; right: 0;
    height: 20px;
    background: linear-gradient(var(--bg), transparent);
    z-index: 4;
    pointer-events: none;
  }

  .messages-fade-bottom {
    position: absolute;
    bottom: 72px;
    left: 0; right: 0;
    height: 20px;
    background: linear-gradient(transparent, var(--bg));
    z-index: 4;
    pointer-events: none;
  }

  /* Error */
  .msg.error {
    align-self: center;
    background: rgba(239,68,68,0.1);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    text-align: center;
    font-size: 9px;
  }
</style>
</head>
<body>

<div class="watch">
  <div class="watch-inner">

    <!-- HOME SCREEN -->
    <div class="screen" id="home">
      <div class="logo-ring">
        <span class="logo-icon">✦</span>
      </div>
      <div class="watch-title">CLAUDE</div>
      <div class="watch-sub">AI Assistant</div>
      <button class="tap-btn" onclick="goToChat()">Ask Claude</button>
    </div>

    <!-- CHAT SCREEN -->
    <div class="screen hidden" id="chat">
      <div class="chat-header">
        <button class="back-btn" onclick="goHome()">‹</button>
        <div class="chat-title-bar">CLAUDE</div>
        <div class="status-dot"></div>
      </div>

      <div class="messages-fade-top"></div>
      <div class="messages" id="messages"></div>
      <div class="messages-fade-bottom"></div>

      <div class="input-row">
        <input class="msg-input" id="msgInput" placeholder="Ask anything…" type="text"
          onkeydown="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
    </div>

    <!-- Circular vignette -->
    <div class="vignette"></div>
  </div>
</div>

<script>
const API_URL = "https://api.anthropic.com/v1/messages";
let conversationHistory = [];
let isLoading = false;

function goToChat() {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('chat').classList.remove('hidden');
  if (conversationHistory.length === 0) {
    addMessage('ai', 'Hi! I\'m Claude. What\'s on your mind?');
  }
  setTimeout(() => document.getElementById('msgInput').focus(), 300);
}

function goHome() {
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are Claude on a Galaxy Watch 4. Keep responses SHORT — 1-3 sentences max. Be conversational, warm, direct. No markdown or bullet points.',
        messages: conversationHistory
      })
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');

    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);

  } catch (err) {
    removeTyping();
    addMessage('error', '⚠ ' + (err.message.length > 60 ? err.message.slice(0,60)+'…' : err.message));
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>

</body>
</html>
